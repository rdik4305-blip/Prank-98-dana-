<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Prank Simulator v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus+Jakarta+Sans', sans-serif; background-color: #f0f2f5; }
        .gradient-header { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div id="app" class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden min-h-[700px] flex flex-col border border-gray-100 relative">
        
        <!-- Status Message Box -->
        <div id="status-box" class="hidden absolute top-0 left-0 right-0 p-4 text-white text-center font-bold text-xs z-50"></div>

        <div class="gradient-header p-8 text-white text-center">
            <h1 class="text-3xl font-extrabold tracking-tight">Prank Pro v4.0</h1>
            <p class="text-xs opacity-80 mt-1">Update: 9 Juli 2026</p>
        </div>

        <div id="form-container" class="p-6 flex-grow">
            <div class="mb-5">
                <label class="block text-gray-500 text-[10px] font-bold mb-2 uppercase">Pilih Layanan</label>
                <select id="service-type" onchange="updateFormFields()" class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-gray-800 border border-gray-200">
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                    <option value="GoPay">GoPay</option>
                    <option value="ShopeePay">ShopeePay</option>
                    <option value="LinkAja">LinkAja</option>
                    <option value="Mobile Legends">Mobile Legends</option>
                    <option value="Free Fire">Free Fire</option>
                    <option value="PUBG Mobile">PUBG Mobile</option>
                    <option value="Roblox">Roblox</option>
                    <option value="Valorant">Valorant</option>
                    <option value="Genshin Impact">Genshin Impact</option>
                    <option value="Honor of Kings">Honor of Kings</option>
                </select>
            </div>

            <div class="mb-5">
                <label id="input-label" class="block text-gray-500 text-[10px] font-bold mb-2 uppercase">Nomor HP/ID</label>
                <input type="text" id="account-id" placeholder="Masukkan ID atau Nomor..." class="w-full p-4 bg-gray-50 rounded-2xl font-bold border border-gray-200">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-500 text-[10px] font-bold mb-2 uppercase">Pilih Nominal</label>
                <select id="amount" class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-indigo-600 border border-gray-200"></select>
            </div>

            <button onclick="startPrank()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-extrabold hover:bg-indigo-700 transition active:scale-[0.98]">Tarik Saldo Sekarang</button>
            
            <div class="mt-8">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-3">Riwayat Terbaru</h3>
                <div id="mini-history" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            'DANA': { label: 'Nomor HP', amounts: ['Rp 10.000', 'Rp 25.000', 'Rp 50.000', 'Rp 100.000', 'Rp 200.000', 'Rp 500.000', 'Rp 1.000.000'] },
            'OVO': { label: 'Nomor HP', amounts: ['Rp 10.000', 'Rp 25.000', 'Rp 50.000', 'Rp 100.000', 'Rp 200.000', 'Rp 500.000', 'Rp 1.000.000'] },
            'GoPay': { label: 'Nomor HP', amounts: ['Rp 10.000', 'Rp 25.000', 'Rp 50.000', 'Rp 100.000', 'Rp 200.000', 'Rp 500.000', 'Rp 1.000.000'] },
            'ShopeePay': { label: 'Nomor HP', amounts: ['Rp 10.000', 'Rp 25.000', 'Rp 50.000', 'Rp 100.000', 'Rp 200.000', 'Rp 500.000'] },
            'LinkAja': { label: 'Nomor HP', amounts: ['Rp 10.000', 'Rp 25.000', 'Rp 50.000', 'Rp 100.000', 'Rp 200.000'] },
            'Mobile Legends': { label: 'User ID', amounts: ['86 Diamonds', '172 Diamonds', '257 Diamonds', '514 Diamonds', '1030 Diamonds', '2195 Diamonds', '5000 Diamonds'] },
            'Free Fire': { label: 'Player ID', amounts: ['70 Diamonds', '140 Diamonds', '355 Diamonds', '720 Diamonds', '1440 Diamonds', '2180 Diamonds', '5600 Diamonds'] },
            'PUBG Mobile': { label: 'Character ID', amounts: ['60 UC', '325 UC', '660 UC', '1800 UC', '3850 UC', '8100 UC'] },
            'Roblox': { label: 'Username', amounts: ['80 Robux', '400 Robux', '800 Robux', '1700 Robux', '4500 Robux', '10000 Robux'] },
            'Valorant': { label: 'Riot ID', amounts: ['125 VP', '420 VP', '750 VP', '1450 VP', '2800 VP', '5500 VP'] },
            'Genshin Impact': { label: 'UID', amounts: ['60 Genesis', '300 Genesis', '980 Genesis', '1980 Genesis', '3280 Genesis', '6480 Genesis'] },
            'Honor of Kings': { label: 'Player ID', amounts: ['60 Tokens', '300 Tokens', '680 Tokens', '1280 Tokens', '2580 Tokens', '6480 Tokens'] }
        };

        let history = [];

        function showMessage(text, isError = true) {
            const box = document.getElementById('status-box');
            box.innerText = text;
            box.classList.remove('hidden', 'bg-red-500', 'bg-green-500');
            box.classList.add(isError ? 'bg-red-500' : 'bg-green-500');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        function updateFormFields() {
            const service = document.getElementById('service-type').value;
            const data = config[service];
            document.getElementById('input-label').innerText = data.label;
            const amountSelect = document.getElementById('amount');
            amountSelect.innerHTML = '';
            data.amounts.forEach(amt => {
                const opt = document.createElement('option');
                opt.value = amt;
                opt.innerText = amt;
                amountSelect.appendChild(opt);
            });
        }

        function startPrank() {
            const target = document.getElementById('account-id').value;
            const amount = document.getElementById('amount').value;
            const service = document.getElementById('service-type').value;
            
            if(!target) {
                showMessage('Harap masukkan ID atau Nomor tujuan!');
                return;
            }
            
            history.unshift({ service, target, amount });
            renderHistory();
            showMessage('Penarikan Berhasil! Saldo/Item akan masuk dalam 1x24 jam.', false);
        }

        function renderHistory() {
            const list = document.getElementById('mini-history');
            list.innerHTML = history.slice(0, 5).map(h => `
                <div class="text-[10px] p-2 bg-gray-50 rounded-lg flex justify-between border-l-4 border-indigo-600 fade-in">
                    <span class="font-bold">${h.service}</span>
                    <span class="text-indigo-600">${h.amount}</span>
                </div>
            `).join('');
        }

        window.onload = updateFormFields;
    </script>
</body>
</html>
